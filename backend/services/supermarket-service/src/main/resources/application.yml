server:
  port: 8082

spring:
  application:
    name: supermarket-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smartmarket}?currentSchema=supermarket
    username: ${DB_USER:smartmarket}
    password: ${DB_PASSWORD:smartmarket}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
  flyway:
    enabled: true
    schemas: supermarket
    create-schemas: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktbG9uZy1hbmQtc2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1zbWFydG1hcmtldA==}
  minio:
    url: ${MINIO_URL:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:admin}
    secret-key: ${MINIO_SECRET_KEY:password}
    bucket-name-brands: ${MINIO_BUCKET_NAME_BRANDS:smartmarket-brands}
    public-url-prefix-brands: ${MINIO_PUBLIC_URL_PREFIX_BRANDS:http://localhost:9000/smartmarket-brands/}
