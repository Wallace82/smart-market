services:
  postgres:
    image: postgres:16
    container_name: smartmarket-postgres
    environment:
      POSTGRES_DB: smartmarket
      POSTGRES_USER: smartmarket
      POSTGRES_PASSWORD: smartmarket
    ports:
      - "5432:5432"
    volumes:
      - smartmarket_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartmarket -d smartmarket"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: smartmarket-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - smartmarket_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Cria os buckets no MinIO automaticamente ao iniciar
  create-bucket:
    image: minio/mc:latest
    container_name: smartmarket-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 admin password;
      /usr/bin/mc mb myminio/smartmarket-products --ignore-existing;
      /usr/bin/mc mb myminio/smartmarket-brands --ignore-existing;
      /usr/bin/mc mb myminio/smartmarket-themes --ignore-existing;
      /usr/bin/mc anonymous set public myminio/smartmarket-products;
      /usr/bin/mc anonymous set public myminio/smartmarket-brands;
      /usr/bin/mc anonymous set public myminio/smartmarket-themes;
      exit 0;
      "

  api-gateway:
    build:
      context: ../../backend/api-gateway
    container_name: smartmarket-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - supermarket-service
      - product-service
      - client-service
      - notification-service
      - recommendation-service

  auth-service:
    build:
      context: ../../backend/services/auth-service
    container_name: smartmarket-auth-service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  supermarket-service:
    build:
      context: ../../backend/services/supermarket-service
    container_name: smartmarket-supermarket-service
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build:
      context: ../../backend/services/product-service
    container_name: smartmarket-product-service
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  client-service:
    build:
      context: ../../backend/services/client-service
    container_name: smartmarket-client-service
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: ../../backend/services/notification-service
    container_name: smartmarket-notification-service
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy

  recommendation-service:
    build:
      context: ../../backend/services/recommendation-service
    container_name: smartmarket-recommendation-service
    ports:
      - "8086:8086"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  smartmarket_postgres_data:
  smartmarket_minio_data: